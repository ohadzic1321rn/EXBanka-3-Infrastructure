syntax = "proto3";

package payment.v1;

option go_package = "github.com/RAF-SI-2025/EXBanka-3-Infrastructure/gen/proto/payment/v1;paymentv1";

import "google/api/annotations.proto";

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse) {
    option (google.api.http) = {
      post: "/api/v1/payments"
      body: "*"
    };
  }

  rpc VerifyPayment(VerifyPaymentRequest) returns (VerifyPaymentResponse) {
    option (google.api.http) = {
      post: "/api/v1/payments/{id}/verify"
      body: "*"
    };
  }

  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse) {
    option (google.api.http) = {
      get: "/api/v1/payments/{id}"
    };
  }

  rpc ListPaymentsByAccount(ListPaymentsByAccountRequest) returns (ListPaymentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/payments/account/{account_id}"
    };
  }

  rpc ListPaymentsByClient(ListPaymentsByClientRequest) returns (ListPaymentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/payments/client/{client_id}"
    };
  }
}

message PaymentProto {
  uint64 id                    = 1;
  uint64 racun_posiljaoca_id   = 2;
  string racun_primaoca_broj   = 3;
  double iznos                 = 4;
  string sifra_placanja        = 5;
  string poziv_na_broj         = 6;
  string svrha                 = 7;
  string status                = 8;
  uint64 recipient_id          = 9;
  string vreme_transakcije     = 10;
}

message CreatePaymentRequest {
  uint64 racun_posiljaoca_id = 1;
  string racun_primaoca_broj = 2;
  double iznos               = 3;
  string sifra_placanja      = 4;
  string poziv_na_broj       = 5;
  string svrha               = 6;
  uint64 recipient_id        = 7;
  bool   add_recipient       = 8;
  string recipient_naziv     = 9;
}

message CreatePaymentResponse {
  PaymentProto payment          = 1;
  string       verification_code = 2;
  string       message          = 3;
}

message VerifyPaymentRequest {
  uint64 id                  = 1;
  string verification_code   = 2;
}

message VerifyPaymentResponse {
  PaymentProto payment = 1;
  string       message = 2;
}

message GetPaymentRequest {
  uint64 id = 1;
}

message GetPaymentResponse {
  PaymentProto payment = 1;
}

message ListPaymentsByAccountRequest {
  uint64 account_id  = 1;
  string date_from   = 2;
  string date_to     = 3;
  double min_amount  = 4;
  double max_amount  = 5;
  string status      = 6;
  int32  page        = 7;
  int32  page_size   = 8;
}

message ListPaymentsByClientRequest {
  uint64 client_id   = 1;
  string date_from   = 2;
  string date_to     = 3;
  double min_amount  = 4;
  double max_amount  = 5;
  string status      = 6;
  int32  page        = 7;
  int32  page_size   = 8;
}

message ListPaymentsResponse {
  repeated PaymentProto payments = 1;
  int64 total                    = 2;
  int32 page                     = 3;
  int32 page_size                = 4;
}
